
<div style="padding: 1rem 0;">
  <h2 class="sr-only">Grafik sunburst arus kas organisasi berdasarkan kategori dan sub kategori</h2>
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap;">
    <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--color-text-secondary);">
      <span style="width:12px;height:12px;border-radius:2px;background:#1D9E75;display:inline-block;"></span> Kas Masuk
    </div>
    <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--color-text-secondary);">
      <span style="width:12px;height:12px;border-radius:2px;background:#D85A30;display:inline-block;"></span> Kas Keluar
    </div>
    <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--color-text-secondary);">
      <span style="width:12px;height:12px;border-radius:2px;background:#378ADD;display:inline-block;"></span> Kas
    </div>
    <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--color-text-secondary);">
      <span style="width:12px;height:12px;border-radius:2px;background:#534AB7;display:inline-block;"></span> Kegiatan
    </div>
    <div style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--color-text-secondary);">
      <span style="width:12px;height:12px;border-radius:2px;background:#BA7517;display:inline-block;"></span> Ta'awun
    </div>
  </div>
  <div style="position:relative;width:100%;height:560px;">
    <canvas id="sbChart" role="img" aria-label="Sunburst chart arus kas dengan selisih saldo Rp27,7jt">Data arus kas organisasi dalam bentuk sunburst.</canvas>
  </div>
  <div id="tooltip" style="display:none;position:fixed;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 12px;font-size:13px;pointer-events:none;z-index:100;"></div>
</div>
<script>
const fmt = v => 'Rp ' + (v/1e6).toFixed(2) + ' jt';

const totalMasuk  = 101478683;
const totalKeluar = 73773901;
const selisih     = totalMasuk - totalKeluar;

const subKas = [
  {label:'Administrasi', masuk:0,        keluar:187500},
  {label:'Donasi',       masuk:150000,   keluar:0},
  {label:'Iuran Kas',    masuk:9638489,  keluar:0},
  {label:'Konsumsi',     masuk:0,        keluar:2476000},
  {label:'Lainnya',      masuk:7461511,  keluar:6284000},
  {label:'Operasional',  masuk:0,        keluar:2818000},
  {label:'Transportasi', masuk:0,        keluar:2200000},
];
const subKeg = [
  {label:'Graduation', masuk:27797785, keluar:5229901},
  {label:'Lainnya',    masuk:800000,   keluar:250000},
  {label:'OASIXTH',    masuk:6272377,  keluar:15975000},
  {label:'Outing',     masuk:26322721, keluar:16114500},
  {label:'Research',   masuk:4629000,  keluar:4729000},
];
const subTaw = [
  {label:'Donasi',     masuk:18406800, keluar:0},
  {label:'Penyaluran', masuk:0,        keluar:17510000},
];

const kasMasuk  = subKas.reduce((s,x)=>s+x.masuk, 0);
const kasKeluar = subKas.reduce((s,x)=>s+x.keluar, 0);
const kegMasuk  = subKeg.reduce((s,x)=>s+x.masuk, 0);
const kegKeluar = subKeg.reduce((s,x)=>s+x.keluar, 0);
const tawMasuk  = subTaw.reduce((s,x)=>s+x.masuk, 0);
const tawKeluar = subTaw.reduce((s,x)=>s+x.keluar, 0);

const cats = [
  {label:'Kas',      masuk:kasMasuk,  keluar:kasKeluar, cm:'#378ADD', cm2:'#5DCAA5', ck2:'#85B7EB', subs:subKas},
  {label:'Kegiatan', masuk:kegMasuk,  keluar:kegKeluar, cm:'#534AB7', cm2:'#AFA9EC', ck2:'#F0997B', subs:subKeg},
  {label:"Ta'awun",  masuk:tawMasuk,  keluar:tawKeluar, cm:'#BA7517', cm2:'#FAC775', ck2:'#EF9F27', subs:subTaw},
];

const canvas   = document.getElementById('sbChart');
const ctx      = canvas.getContext('2d');
const tooltip  = document.getElementById('tooltip');
const segments = [];

function buildSunburst() {
  const dpr  = window.devicePixelRatio || 1;
  const size = Math.min(canvas.parentElement.clientWidth, 560);
  canvas.style.width  = size + 'px';
  canvas.style.height = size + 'px';
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  ctx.scale(dpr, dpr);

  const cx = size/2, cy = size/2;
  const total = totalMasuk + totalKeluar;
  const R0 = size * 0.10;
  const R1 = size * 0.22;
  const R2 = size * 0.38;
  const R3 = size * 0.48;

  segments.length = 0;
  ctx.clearRect(0, 0, size, size);

  function arc(startA, endA, r0, r1, color, label, value) {
    const span = endA - startA;
    ctx.beginPath();
    ctx.arc(cx, cy, r1, startA, endA);
    ctx.arc(cx, cy, r0, endA, startA, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    if (span > 0.07 && r1 - r0 > 16) {
      const mA = (startA + endA) / 2;
      const mR = (r0 + r1) / 2;
      ctx.save();
      ctx.translate(cx + mR * Math.cos(mA), cy + mR * Math.sin(mA));
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.font = span > 0.25 ? '500 11px sans-serif' : '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const words = label.split(' ');
      if (words.length > 1 && span < 0.3) {
        ctx.fillText(words[0], 0, -6);
        ctx.fillText(words.slice(1).join(' '), 0, 6);
      } else {
        ctx.fillText(label, 0, 0);
      }
      ctx.restore();
    }
    segments.push({startA, endA, r0, r1, label, value});
  }

  // Tengah: selisih saldo
  const saldoColor = selisih >= 0 ? '#1D9E75' : '#D85A30';
  ctx.beginPath();
  ctx.arc(cx, cy, R0, 0, Math.PI * 2);
  ctx.fillStyle = saldoColor;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '500 10px sans-serif';
  ctx.fillText('Selisih Saldo', cx, cy - 10);
  ctx.font = '500 12px sans-serif';
  ctx.fillText(fmt(selisih), cx, cy + 6);

  // Ring 1: Masuk vs Keluar
  const sM = -Math.PI / 2;
  const masukAngle  = (totalMasuk  / total) * 2 * Math.PI;
  const keluarAngle = (totalKeluar / total) * 2 * Math.PI;

  arc(sM, sM + masukAngle, R0, R1, '#1D9E75', 'Kas Masuk', totalMasuk);
  arc(sM + masukAngle, sM + 2 * Math.PI, R0, R1, '#D85A30', 'Kas Keluar', totalKeluar);

  // Ring 2 & 3: Kategori & Sub Kategori
  let curMasuk  = sM;
  let curKeluar = sM + masukAngle;

  cats.forEach(cat => {
    if (cat.masuk > 0) {
      const a = (cat.masuk / totalMasuk) * masukAngle;
      arc(curMasuk, curMasuk + a, R1, R2, cat.cm, cat.label, cat.masuk);
      let sc = curMasuk;
      cat.subs.forEach(s => {
        if (s.masuk > 0) {
          const sa = (s.masuk / cat.masuk) * a;
          arc(sc, sc + sa, R2, R3, cat.cm2, s.label, s.masuk);
          sc += sa;
        }
      });
      curMasuk += a;
    }
    if (cat.keluar > 0) {
      const a = (cat.keluar / totalKeluar) * keluarAngle;
      arc(curKeluar, curKeluar + a, R1, R2, cat.cm, cat.label, cat.keluar);
      let sc = curKeluar;
      cat.subs.forEach(s => {
        if (s.keluar > 0) {
          const sa = (s.keluar / cat.keluar) * a;
          arc(sc, sc + sa, R2, R3, cat.ck2, s.label, s.keluar);
          sc += sa;
        }
      });
      curKeluar += a;
    }
  });
}

buildSunburst();

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const size = parseFloat(canvas.style.width);
  const cx = size/2, cy = size/2;
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const dx = mx - cx, dy = my - cy;
  const r = Math.sqrt(dx*dx + dy*dy);
  let angle = Math.atan2(dy, dx);
  const base = -Math.PI/2;
  let norm = angle - base;
  if (norm < 0) norm += 2*Math.PI;

  let hit = null;
  for (const seg of segments) {
    let sa = seg.startA - base; if(sa<0) sa+=2*Math.PI;
    let ea = seg.endA   - base; if(ea<0) ea+=2*Math.PI;
    if (ea < sa) ea += 2*Math.PI;
    let na = norm; if(na < sa-0.001) na+=2*Math.PI;
    if (r >= seg.r0 && r <= seg.r1 && na >= sa-0.001 && na <= ea+0.001) {
      hit = seg; break;
    }
  }

  if (hit) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    tooltip.innerHTML  = `<strong style="color:var(--color-text-primary)">${hit.label}</strong><br><span style="color:var(--color-text-secondary)">${fmt(hit.value)}</span>`;
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mouseleave', () => { tooltip.style.display='none'; });
window.addEventListener('resize', buildSunburst);
</script>
